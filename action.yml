name: "Deploy getbao"
description: "Build and deploy getbao auth service to Cloudflare Workers"
author: "getbao"

inputs:
  environment:
    description: "Deployment environment label (e.g. sandbox, production)"
    required: false
    default: "sandbox"
  api_token:
    description: "Cloudflare API Token with Workers edit permissions"
    required: true
  account_id:
    description: "Cloudflare Account ID"
    required: true
  app_secrets:
    description: "JSON string of application secrets (e.g., from toJson(secrets))"
    required: false
    default: "{}"
  force_rotate:
    description: "Discard all existing BETTER_AUTH_SECRETS versions and regenerate from scratch (destructive — logs all users out)"
    required: false
    default: "false"
  api_url:
    description: "Base URL of the BAO API"
    required: false
    default: "https://api.getbao.dev"
  version:
    description: "getbao release version to deploy (e.g. v1.2.3). Defaults to 'latest' which resolves to the latest stable release."
    required: false
    default: "latest"
  license_key:
    description: "getbao license key for downloading release assets"
    required: true
  github_token:
    description: "GitHub API Token to submit Pull Request"
    required: true

outputs:
  pr_url:
    description: "URL of the pull request created for the OpenTofu state update (empty if no state changed)"
    value: ${{ steps.create-pr.outputs.pull-request-url }}
  deployment_url:
    description: "URL of the deployed Cloudflare Worker"
    value: ${{ steps.deploy.outputs.deployment-url }}

runs:
  using: "composite"
  steps:
    # ── Setup Node.js ──────────────────────────────────────────────────────
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"

    # ── Restore asset cache ────────────────────────────────────────────────
    - name: Restore asset cache
      id: asset-cache
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/.bao-assets
        key: bao-assets-${{ inputs.version }}

    # ── Download release assets (cache miss only) ──────────────────────────
    - name: Download release assets
      if: steps.asset-cache.outputs.cache-hit != 'true'
      shell: bash
      run: node "${{ github.action_path }}/dist/download-assets.js"
      env:
        BAO_API_KEY: ${{ inputs.license_key }}
        BAO_API_URL: ${{ inputs.api_url }}
        VERSION: ${{ inputs.version }}
        ASSETS_DIR: ${{ github.workspace }}/.bao-assets

    # ── Setup OpenTofu ─────────────────────────────────────────────────────
    - name: Setup OpenTofu
      uses: opentofu/setup-opentofu@v1
      with:
        tofu_wrapper: false

    # ── Ensure state directory exists ──────────────────────────────────────
    - name: Prepare state directory
      shell: bash
      run: mkdir -p "$GITHUB_WORKSPACE/.bao"

    # ── tofu init ──────────────────────────────────────────────────────────
    - name: OpenTofu init
      shell: bash
      working-directory: ${{ github.workspace }}/.bao-assets/tf
      run: tofu init -backend-config="path=$GITHUB_WORKSPACE/.bao/terraform-${{ inputs.environment }}.tfstate"
      env:
        CLOUDFLARE_API_TOKEN: ${{ inputs.api_token }}

    # ── tofu apply ─────────────────────────────────────────────────────────
    - name: OpenTofu apply
      shell: bash
      working-directory: ${{ github.workspace }}/.bao-assets/tf
      run: |
        APP_NAME=$(node -e "try { process.stdout.write(require('$GITHUB_WORKSPACE/bao.config.json').appName || 'getbao') } catch(e) { process.stdout.write('getbao') }")
        tofu apply -auto-approve \
          -var="account_id=${{ inputs.account_id }}" \
          -var="api_token=${{ inputs.api_token }}" \
          -var="db_name=bao-db-${{ inputs.environment }}" \
          -var="project_name=$APP_NAME" \
          -var="kv_namespace_name=bao-config-${{ inputs.environment }}"
      env:
        CLOUDFLARE_API_TOKEN: ${{ inputs.api_token }}

    # ── Capture tofu outputs ───────────────────────────────────────────────
    - name: Get OpenTofu outputs
      id: tofu-outputs
      shell: bash
      working-directory: ${{ github.workspace }}/.bao-assets/tf
      run: tofu output -json | node "${{ github.action_path }}/dist/parse-tofu-outputs.js"

    # ── Generate wrangler.json ─────────────────────────────────────────────
    - name: Generate wrangler.json
      id: gen-config
      shell: bash
      run: node "${{ github.action_path }}/dist/generate-config.js"
      env:
        DEPLOY_ENV: ${{ inputs.environment }}
        TOFU_DB_ID: ${{ steps.tofu-outputs.outputs.db_id }}
        TOFU_DB_NAME: ${{ steps.tofu-outputs.outputs.db_name }}
        TOFU_KV_ID: ${{ steps.tofu-outputs.outputs.kv_id }}
        ASSETS_DIR: ${{ github.workspace }}/.bao-assets

    # ── Commit state + open PR ─────────────────────────────────────────────
    - name: Create pull request for state update
      id: create-pr
      uses: peter-evans/create-pull-request@v7
      with:
        token: ${{ inputs.github_token }}
        add-paths: .bao/terraform-${{ inputs.environment }}.tfstate
        commit-message: "chore: update OpenTofu state (${{ inputs.environment }}) [skip ci]"
        branch: bao/update-state-${{ inputs.environment }}
        delete-branch: true
        title: "chore: update OpenTofu state (${{ inputs.environment }})"
        body: |
          Automated OpenTofu state update for **${{ inputs.environment }}** from the bao deploy action.

          **App:** `${{ steps.gen-config.outputs.app_name }}`
          **D1 database ID:** `${{ steps.tofu-outputs.outputs.db_id }}`

    # ── Parse App Secrets ──────────────────────────────────────────────────
    - name: Parse app secrets
      id: parse-secrets
      shell: bash
      run: node "${{ github.action_path }}/dist/parse-secrets.js"
      env:
        APP_SECRETS: ${{ inputs.app_secrets }}

    # ── Apply D1 Migrations ───────────────────────────────────────────────
    - name: Apply Database Migrations
      if: ${{ steps.tofu-outputs.outputs.db_id != '' }}
      shell: bash
      run: |
        if [ -d "$GITHUB_WORKSPACE/.bao-assets/migrations" ] && [ "$(ls -A $GITHUB_WORKSPACE/.bao-assets/migrations)" ]; then
          echo "Running migrations against DB binding..."
          npx --yes wrangler d1 migrations apply DB --remote -c wrangler.json --env ${{ inputs.environment }}
        else
          echo "No migrations found, skipping."
        fi
      env:
        CLOUDFLARE_API_TOKEN: ${{ inputs.api_token }}
        CLOUDFLARE_ACCOUNT_ID: ${{ inputs.account_id }}
        npm_config_registry: https://registry.npmjs.org
        npm_config_userconfig: /dev/null
        npm_config_cache: /tmp/bao-npm-cache

    # ── Deploy Auth Worker ────────────────────────────────────────────────
    - name: Deploy Auth Worker
      id: deploy
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ inputs.api_token }}
        accountId: ${{ inputs.account_id }}
        workingDirectory: ${{ github.workspace }}
        command: deploy -c wrangler.json --env ${{ inputs.environment }}
        secrets: ${{ env.SECRET_KEYS }}
        packageManager: npm
        wranglerVersion: "4"

    # ── Deploy Rotation Worker ────────────────────────────────────────────
    - name: Deploy Rotation Worker
      id: deploy-rotation
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ inputs.api_token }}
        accountId: ${{ inputs.account_id }}
        workingDirectory: ${{ github.workspace }}
        command: deploy -c wrangler-rotation.json --env ${{ inputs.environment }}
        packageManager: npm
        wranglerVersion: "4"

    # ── Bootstrap Secrets ────────────────────────────────────────────────
    - name: Bootstrap Auth Secrets
      id: bootstrap-secrets
      shell: bash
      run: node "${{ github.action_path }}/dist/bootstrap-secrets.js"
      env:
        CLOUDFLARE_ACCOUNT_ID: ${{ inputs.account_id }}
        CLOUDFLARE_API_TOKEN: ${{ inputs.api_token }}
        KV_NAMESPACE_ID: ${{ steps.tofu-outputs.outputs.kv_id }}
        AUTH_WORKER_NAME: ${{ steps.gen-config.outputs.app_name }}-${{ inputs.environment }}
        ROTATION_WORKER_NAME: ${{ steps.gen-config.outputs.rotation_worker_name }}-${{ inputs.environment }}
        FORCE_ROTATE: ${{ inputs.force_rotate }}

branding:
  icon: "lock"
  color: purple
